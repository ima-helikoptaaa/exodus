version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: exodus
      POSTGRES_PASSWORD: exodus_dev
      POSTGRES_DB: exodus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://exodus:exodus_dev@postgres:5432/exodus?schema=public
      CORS_ORIGIN: http://localhost:5173
      PORT: "3000"
    depends_on:
      - postgres

volumes:
  pgdata:
